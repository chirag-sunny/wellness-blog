name: Generate Health Article

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Generate new article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 generate_post.py

      - name: Commit new article
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add posts.json
          git diff --staged --quiet || git commit -m "Auto-post: New health article $(date +'%Y-%m-%d')"
          git push
